services:
  postgres:
    image: postgres:16-alpine
    container_name: emby-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: emby_next
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped  # v3-stats-rebuild

  redis:
    image: redis:7-alpine
    container_name: emby-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped  # v3-stats-rebuild

  backend:
    build:
      context: ./backend
    container_name: emby-backend
    environment:
      APP_ENV: production
      DEBUG: "false"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/emby_next"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000}"
      # ====== Emby 配置 ======
      EMBY_HOST: "${EMBY_HOST:-http://host.docker.internal:8096}"
      EMBY_API_KEY: "${EMBY_API_KEY:-}"
      EMBY_DATA_MODE: "${EMBY_DATA_MODE:-api}"
      EMBY_WEBHOOK_TOKEN: "${EMBY_WEBHOOK_TOKEN:-embyconsole}"
      # 同机部署时可读取数据库文件（需挂载）
      # EMBY_DB_PATH: "/data/playback_reporting.db"
    volumes:
      # 同机部署时挂载 Emby 数据库目录（可选）
      # - /path/to/emby-data:/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 2
      "
    restart: unless-stopped  # v3-stats-rebuild

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-owner/emby-next-console}-frontend:latest
    container_name: emby-frontend
    build:
      context: ./frontend
      args:
        CACHE_BUST: "1"
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped  # v3-stats-rebuild

volumes:
  postgres_data:
  redis_data:
